<link rel="stylesheet" href="assets/css/styles.css?v=21">

<style>
  /* Pagina 404 - imagem full screen, lua branca, fundo escuro */
  body{background:#131313}
  body::before{display:none}
  .err{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:#131313;color:#C4C4C4}

  /* palco: imagem ocupando a tela toda, texto sobreposto na base */
  .err-stage{position:relative;flex:1;overflow:hidden;display:flex;align-items:flex-end;justify-content:center}
  .err-img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:contain;object-position:center 40%;
    padding:clamp(0.5rem,2vw,1.75rem);
    filter:drop-shadow(0 0 90px rgba(255,255,255,0.07));
    animation:errFig 1.1s var(--ease) both;
  }
  .err-scrim{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(19,19,19,0) 30%,rgba(19,19,19,0.45) 55%,rgba(19,19,19,0.82) 72%,rgba(19,19,19,0.98) 100%)}

  .err-overlay{position:relative;z-index:2;text-align:center;max-width:42rem;
    padding:0 clamp(1.25rem,4vw,2.75rem) clamp(2.2rem,5vw,3.6rem);
    text-shadow:0 1px 18px rgba(0,0,0,0.65),0 1px 3px rgba(0,0,0,0.5)}
  .err-eyebrow{color:#B6B6B6;letter-spacing:0.3em;font-size:0.74rem}
  .err-title{color:#F4F4F4;font-weight:500;font-size:clamp(2rem,5.2vw,3.4rem);line-height:1.06;letter-spacing:-0.02em;margin-top:0.95rem}
  .err-sub{color:#C2C2C2;font-size:clamp(1rem,1.8vw,1.18rem);line-height:1.6;margin-top:1rem;margin-inline:auto;max-width:38ch}
  .err-btn{margin-top:1.9rem}
  .err .btn-ghost{color:#FAFAFA;border-color:rgba(255,255,255,0.3)}
  .err .btn-ghost:hover{border-color:#FAFAFA;background:rgba(255,255,255,0.06)}

  /* credito Almeida Escala (obrigatorio) + Vecteezy - discreto */
  .err-credit{text-align:center;padding:0 clamp(1.25rem,4vw,2.75rem) clamp(1rem,2.5vw,1.4rem);font-size:0.7rem;color:#6C6C6C}
  .err-credit a{color:#8A8A8A;text-decoration:underline;text-underline-offset:2px;transition:color .25s ease}
  .err-credit a:hover{color:#DADADA}

  /* entrada suave do bloco de texto */
  .err-overlay{opacity:0;transform:translateY(18px);animation:errIn .9s .15s var(--ease) forwards}
  @keyframes errIn{to{opacity:1;transform:none}}
  @keyframes errFig{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .err-img,.err-overlay{opacity:1;transform:none;animation:none}
  }
</style>

<body class="font-body antialiased">

<div class="err">

  <main class="err-stage">

    <div class="err-scrim" aria-hidden="true"></div>

    <div class="err-overlay">
      <p class="label-caps err-eyebrow">Erro 404</p>
      <h1 class="err-title font-display">Página não encontrada</h1>
      <p class="err-sub">O endereço que você acessou não existe ou foi movido.</p>
      <a href="/" class="btn-ghost err-btn">Voltar ao início</a>
    </div>
  </main>

  <p class="err-credit">

  </p>

</div>

</body>
